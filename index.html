<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow — Personal Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">FinFlow</div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
      <button class="export-btn" onclick="exportCSV()">⬇ <span>Export CSV</span></button>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="container">

    <!-- SUMMARY CARDS -->
    <div class="cards-grid">
      <div class="card total">
        <div class="card-label">Total Spent</div>
        <div class="card-value" id="totalSpent">₹0</div>
        <div class="card-sub">this month</div>
      </div>
      <div class="card budget">
        <div class="card-label">Monthly Budget</div>
        <div class="card-value" id="budgetDisplay">₹0</div>
        <div class="card-sub">set your limit</div>
      </div>
      <div class="card remaining">
        <div class="card-label">Remaining</div>
        <div class="card-value" id="remainingDisplay">₹0</div>
        <div class="card-sub" id="remainSub">available to spend</div>
      </div>
      <div class="card count">
        <div class="card-label">Transactions</div>
        <div class="card-value" id="txCount">0</div>
        <div class="card-sub">total entries</div>
      </div>
    </div>

    <!-- BUDGET BAR -->
    <div class="budget-bar-wrap">
      <div class="budget-bar-header">
        <div class="budget-bar-title">Budget Usage</div>
        <div class="budget-input-row">
          <label>Set budget:</label>
          <input type="number" id="budgetInput" placeholder="e.g. 20000" min="0" />
          <button class="set-budget-btn" onclick="setBudget()">Set</button>
        </div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-pct" id="progressPct">0% used</div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- ADD/EDIT FORM -->
      <div class="form-panel">
        <div class="panel-title">
          <span class="dot"></span>
          <span id="formTitle">Add Expense</span>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="expTitle" placeholder="e.g. Dinner at Cafe" />
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="expAmount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="expCategory">
            <option value="Food">🍔 Food</option>
            <option value="Travel">✈ Travel</option>
            <option value="Shopping">🛍 Shopping</option>
            <option value="Health">💊 Health</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Education">📚 Education</option>
            <option value="Bills">🧾 Bills</option>
            <option value="Others">📦 Others</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="expDate" />
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveExpense()">Add Expense</button>
          <button class="btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
        </div>
      </div>

      <!-- EXPENSE LIST -->
      <div class="list-panel">
        <div class="list-top">
          <div class="panel-title" style="margin-bottom:0">Expenses</div>
        </div>
        <div class="search-filter-row">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input type="text" id="searchInput" placeholder="Search expenses..." oninput="renderList()" />
          </div>
          <select class="filter-select" id="filterCat" onchange="renderList()">
            <option value="">All Categories</option>
            <option value="Food">🍔 Food</option>
            <option value="Travel">✈ Travel</option>
            <option value="Shopping">🛍 Shopping</option>
            <option value="Health">💊 Health</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Education">📚 Education</option>
            <option value="Bills">🧾 Bills</option>
            <option value="Others">📦 Others</option>
          </select>
        </div>
        <div class="expense-list" id="expenseList">
          <div class="empty-state">
            <div class="empty-icon">💸</div>
            <p>No expenses yet.<br />Add your first expense!</p>
          </div>
        </div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="charts-grid">
      <div class="chart-panel">
        <div class="panel-title" style="margin-bottom:16px">Spending by Category</div>
        <canvas id="donutChart"></canvas>
      </div>
      <div class="chart-panel">
        <div class="panel-title" style="margin-bottom:16px">Daily Spending Trend</div>
        <canvas id="lineChart"></canvas>
      </div>
    </div>

  </div><!-- end .container -->

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-title">Edit Expense</div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="mTitle" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="mAmount" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="mCategory">
          <option value="Food">🍔 Food</option>
          <option value="Travel">✈ Travel</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Education">📚 Education</option>
          <option value="Bills">🧾 Bills</option>
          <option value="Others">📦 Others</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="mDate" />
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast">
    <span class="toast-icon" id="toastIcon">✓</span>
    <span id="toastMsg">Done!</span>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
